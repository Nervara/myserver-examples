services:
  # `web` is built from a NESTED build context (app/web), mirroring the
  # docker/awesome-compose layout (e.g. aspnetapp's `build: app/aspnetapp`).
  # This only works when the source is on disk — i.e. deployed from a Git
  # repo (base directory = /samples/compose-build-context), NOT as inline
  # paste-and-deploy compose. Inline compose writes only the YAML and has
  # no source to build, so a local `build:` context fails with
  # "unable to prepare context: path .../app/web not found".
  web:
    build: app/web
    # Container-only port — NOT a host binding. On myserver the proxy
    # (Caddy) owns host :80/:443 and routes to this service via the
    # compose network alias, so publishing `80:80` would collide with
    # the proxy ("Bind for :::80 failed: port is already allocated").
    # `ports_exposes=80` on the app tells Caddy which container port to
    # reverse-proxy to. (Run standalone? add `ports: ["8080:80"]` back.)
    expose:
      - "80"
    environment:
      - CACHE_URL=redis://cache:6379
    depends_on:
      cache:
        condition: service_healthy
    networks:
      - app

  # `cache` is a PRE-BUILT image sibling — pulled, not built. A real
  # compose mixes both (the aspnetapp that broke had a built `web` + a
  # pulled `db`), so the sample exercises both code paths in one stack.
  cache:
    image: redis:alpine
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app:
