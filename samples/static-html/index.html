<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Static HTML | myserver</title>
    <link href="https://fonts.googleapis.com/css2?family=Uncut+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #ff3e00;
        }
        body {
            font-family: 'Uncut Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(255, 62, 0, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 150, 255, 0.1), transparent 40%);
        }
        h1 {
            font-size: 15vw;
            line-height: 0.8;
            margin: 0;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.5rem;
            margin-top: 2rem;
            color: #888;
            max-width: 600px;
        }
        .badge {
            margin-bottom: 2rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 99px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #222;
            width: 100%;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }
        .grid-item {
            background: #000;
            padding: 4rem 2rem;
            text-align: center;
        }
        .grid-item h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .grid-item p {
            font-size: 1.25rem;
            margin: 0;
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="badge">Static Buildpack</div>
        <h1>Pure<br>HTML</h1>
        <p class="subtitle">A minimalist static site demonstration showing the power of zero-configuration deployments on myserver.</p>
    </div>
    
    <div class="grid">
        <div class="grid-item">
            <h3>Type</h3>
            <p>Static Site</p>
        </div>
        <div class="grid-item">
            <h3>Server</h3>
            <p>Nginx / Alpine</p>
        </div>
        <div class="grid-item">
            <h3>Speed</h3>
            <p>100 Score</p>
        </div>
    </div>

    <footer style="padding: 4rem; text-align: center; color: #444; font-size: 0.8rem;">
        &copy; 2026 myserver examples
    </footer>
</body>
</html>
